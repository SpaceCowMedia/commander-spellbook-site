version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    registries: "*"
    groups:
      react:
        patterns:
         - react
         - react-dom
         - @types/react
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    cooldown:
      # Supply chain attack defense - don't use packages published within 1 day
      default-days: 1
      
registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{ secrets.DEPENDABOT_GITHUB_REGISTRY_TOKEN }}
