overrides:
  # Force the ESM-only-preset fix; @commitlint/load pins the buggy 21.0.1
  # which fails with ERR_PACKAGE_PATH_NOT_EXPORTED on conventional-changelog-conventionalcommits.
  "@commitlint/resolve-extends": "21.2.0"

# Supply chain attack defense - don't use packages published within 1 day
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@space-cow-media/spellbook-client"

# Stops a dep bypassing minimumReleaseAge via a git/tarball source
blockExoticSubdeps: true

allowBuilds:
  "@parcel/watcher": true
  canvas: true
  cypress: true
  sharp: true
